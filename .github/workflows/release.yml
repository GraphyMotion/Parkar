name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > parkar-release.keystore

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=parkar-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        run: ./gradlew assembleRelease --console=plain

      - name: Clean up signing material
        if: always()
        run: rm -f parkar-release.keystore keystore.properties

      - name: Prepare release assets
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk "release-out/Parkar-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "release-out/Parkar.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/*.apk
          generate_release_notes: true
